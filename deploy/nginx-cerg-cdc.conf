# ============================================================
# CERG - CDC - referencia de reverse proxy (SSE)
#
# El reverse proxy corre en el firewall IPFire, NO en este contenedor.
# Este archivo es una REFERENCIA de como configurar ahi el proxy hacia
# gunicorn (que escucha en <IP-del-CT>:8000). Lo critico es el bloque de
# /api/stream con buffering DESACTIVADO: sin eso, los eventos SSE llegan
# tarde o nunca. Adaptar upstream/server_name al entorno del IPFire.
# ============================================================

upstream cerg_cdc {
    server 192.168.0.113:8000;   # <-- IP del contenedor CDC (ajustar)
}

server {
    listen 80 default_server;
    # server_name comodin: responde por IP o cualquier nombre. Si mas adelante
    # configuras DNS (p.ej. cdc.cooprg.net), podes ponerlo aca.
    server_name _;

    # --- Endpoint SSE: buffering DESACTIVADO ---
    # Sin esto, nginx acumula el stream y los eventos llegan tarde o nunca.
    location /api/stream {
        proxy_pass http://cerg_cdc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;    # conexiones SSE largas
        chunked_transfer_encoding on;
    }

    # --- Resto de la app ---
    location / {
        proxy_pass http://cerg_cdc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
